<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- 🔹 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">

    <a class="navbar-brand" href="{{url_for('home')}}">💰 ExpenseTracker</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <!-- Left menu -->
      <ul class="navbar-nav me-auto">
       
        <li class="nav-item">
          <a class="nav-link" href="{{url_for('expense')}}">Expense</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{url_for('emi')}}">EMI's</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{url_for('loans')}}">Loans</a>
        </li>
      </ul>

      <!-- Right side -->
      <div class="d-flex align-items-center gap-3">
        <span class="text-white">👤 {{username}}</span>
        <a href="{{ url_for('logout') }}" class="btn btn-danger btn-sm">Logout</a>
      </div>

    </div>
  </div>
</nav>

<!-- 🔹 Main Content -->
<div class="container mt-4">
    {% block body %}
    {% endblock %}
</div>

<!-- ✅ Bootstrap JS (IMPORTANT) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
