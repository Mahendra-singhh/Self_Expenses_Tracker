{% extends 'profile.html'%}
{% block body %}

<div class="edit-container">

  <div class="edit-card">

    <h4 class="mb-3">✏️ Edit Expense</h4>

    <!-- Edit Form -->
    <form action="{{ url_for('edit', id=expense.id) }}" method="POST">

      <div class="mb-3">
        <label class="form-label">Expense</label>
        <input type="text" name="expense" value="{{ expense.name }}" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Amount</label>
        <input type="text" name="amount" value="{{ expense.amount }}" class="form-control">
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success w-100">Save</button>
      </div>

    </form>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="mt-3">
      {% for category, message in messages %}
      <div class="alert alert-{{ category }}">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <hr>

    <!-- Delete Form -->
    <form action="{{ url_for('delete', id=expense.id) }}" method="POST">
      <button type="submit" class="btn btn-danger w-100">Delete Expense</button>
    </form>

  </div>

</div>

{% endblock %}
