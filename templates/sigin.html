<!DOCTYPE html>
<html lang="en">
<head>
 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
<div class=" sigin">
<h2>Signup</h2>
{% with messages=get_flashed_messages(with_categories=True) %}
{%for message in messages%}
{%for category,message in messages%}
<div class="alert alert-{{category}}">
  {{message}}
</div>
{% endfor %}
{%endfor%}
{% endwith %}

<div class="signdata">
  <form method='POST'>
  <div class="form-group">
    <label for="exampleInputEmail1">Email address</label>
    <input type="email" name="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
     <label for="exampleInputpassword">Password</label>
    <input type="password" name="password" class="form-control" id="exampleInputpassword" aria-describedby="emailHelp">
   <label for="exampleInputpassword">Username</label>
    <input type="text" name="username" class="form-control" id="exampleInputUsername" aria-describedby="emailHelp">
    
  </div>
  
  <button type="submit" class="btn btn-primary">Create Account</button>
</form>
<div class="no-style">
<a href="{{url_for('login')}}">Already registered return to Login</a>
</div>
</div>
</body>
